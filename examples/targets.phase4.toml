# `status` field semantics (Day 49 addition):
#   "ready"      — toolchain-reachable + not yet tested at fuzz depth
#   "exhausted"  — toolchain-reachable but already tested clean (no marginal yield)
#   "gated"      — depth-gated by toolchain (Day 47 H1: Anchor 0.x ↔ LiteSVM 0.9.1)
#   "unverified" — Anchor version / build chain not yet confirmed (default)
#
# Verified by direct evidence in this repo. Unverified entries should
# be promoted to ready/gated only after either a build smoke or a source
# inspection.

